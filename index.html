<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HotSpot Tracker - 全球热点追踪</title>
<style>
:root{--primary:#FF6B35;--bg:#0F172A;--bg-card:#1E293B;--text:#E2E8F0;--text-muted:#94A3B8;--border:#334155;--success:#10B981;--warning:#F59E0B;--info:#3B82F6;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.screen{display:none;padding:16px;padding-bottom:80px;min-height:100vh}
.screen.active{display:block}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(30,41,59,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;color:var(--text-muted);font-size:11px;cursor:pointer;border:none;background:none}
.tab-item.active{color:var(--primary)}
.tab-icon{font-size:22px;margin-bottom:2px}
.card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500;margin-right:6px}
.tag-primary{background:rgba(255,107,53,0.2);color:var(--primary)}
.tag-info{background:rgba(59,130,246,0.2);color:var(--info)}
.platform-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.platform-badge{display:inline-flex;align-items:center;gap:3px;background:#0F172A;border:1px solid var(--border);padding:3px 8px;border-radius:6px;font-size:11px}
.platform-badge.real{border-color:var(--success)}
.platform-badge.inferred{border-style:dashed;border-color:var(--warning)}
.platform-badge .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.platform-badge.real .dot{background:var(--success)}
.platform-badge.inferred .dot{background:var(--warning)}
.flex-row{display:flex;align-items:center}.flex-between{display:flex;justify-content:space-between;align-items:center}.flex-wrap{flex-wrap:wrap}
.gap-8{gap:8px}.gap-16{gap:16px}
.text-sm{font-size:12px}.text-muted{color:var(--text-muted)}
.section-title{font-size:17px;font-weight:700;margin:20px 0 12px;color:#fff;display:flex;align-items:center;gap:6px}
.section-title .count{font-size:12px;font-weight:400;color:var(--text-muted);margin-left:auto}
.search-bar{display:flex;align-items:center;background:var(--bg-card);border-radius:24px;padding:12px 20px;margin-bottom:20px;border:1px solid var(--border);cursor:pointer}
.search-bar .icon{margin-right:10px;font-size:18px}
.search-bar .placeholder{color:var(--text-muted);font-size:14px}
.topic-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border);position:relative;cursor:pointer}
.topic-card:active{transform:scale(0.98)}
.topic-card.rank-1{border-color:#FFD700;background:linear-gradient(135deg,#1E293B,#2D1B00)}
.rank-badge{position:absolute;top:0;right:0;background:var(--primary);color:#fff;font-size:13px;font-weight:700;padding:6px 16px;border-radius:0 12px 0 12px}
.rank-1 .rank-badge{background:#FFD700;color:#000}
.topic-title{font-size:15px;font-weight:600;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;padding-right:55px}
.heat-score{font-size:15px;font-weight:700;color:var(--primary)}
.topic-list-item{display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid rgba(51,65,85,0.5);gap:12px;cursor:pointer}
.topic-list-item:active{opacity:0.7}
.rank-num{font-size:28px;font-weight:800;color:var(--text-muted);min-width:45px;text-align:center;line-height:1}
.top-rank .rank-num{color:#FFD700}
.list-body{flex:1;min-width:0}
.list-title{font-size:15px;font-weight:600;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.region-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding:4px 0}
.region-tabs::-webkit-scrollbar{display:none}
.region-tab{flex-shrink:0;padding:10px 18px;border-radius:20px;font-size:13px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .2s}
.region-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{padding:8px 14px;border-radius:8px;font-size:13px;background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border);cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.detail-title{font-size:22px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:12px}
.heat-big{font-size:36px;font-weight:800;color:var(--primary)}
.platform-trace-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(51,65,85,0.5);gap:10px}
.platform-trace-item:last-child{border-bottom:none}
.platform-icon{font-size:24px;background:#0F172A;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
.trace-rank{font-size:15px;font-weight:600;color:#fff}
.search-input-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.search-input{flex:1;display:flex;align-items:center;background:var(--bg-card);border-radius:24px;padding:12px 20px;border:1px solid var(--border)}
.search-input input{flex:1;background:transparent;color:#fff;font-size:15px;border:none;outline:none}
.search-input input::placeholder{color:var(--text-muted)}
.cancel-btn{color:var(--text-muted);font-size:14px;cursor:pointer;white-space:nowrap}
.keyword-cloud{display:flex;flex-wrap:wrap;gap:8px}
.keyword-tag{padding:8px 16px;background:var(--bg-card);border-radius:16px;font-size:13px;border:1px solid var(--border);cursor:pointer;color:#E2E8F0}
.keyword-tag:active{background:var(--primary);color:#fff}
.search-result-item{padding:16px 0;border-bottom:1px solid rgba(51,65,85,0.5);cursor:pointer}
.search-result-item:active{opacity:0.7}
.result-title{font-size:15px;font-weight:600;color:#fff}
.user-card{display:flex;align-items:center;gap:16px}
.avatar{width:64px;height:64px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:32px}
.nickname{font-size:17px;font-weight:600;color:#fff}
.menu-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;font-size:15px;color:#E2E8F0;border-bottom:1px solid rgba(51,65,85,0.3);cursor:pointer}
.menu-item:last-child{border-bottom:none}.menu-item:active{opacity:0.7}
.action-bar{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:none;gap:10px;padding:12px 16px;background:var(--bg-card);border-top:1px solid var(--border);z-index:99}
.btn-primary{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;border:none;background:var(--primary);color:#fff;cursor:pointer}
.btn-secondary{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;border:2px solid var(--primary);background:transparent;color:var(--primary);cursor:pointer}
.empty{padding:60px 0;text-align:center;color:var(--text-muted)}
.empty .icon{font-size:48px;margin-bottom:12px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:15px;color:var(--text-muted);margin-bottom:16px;cursor:pointer}
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.region-preview{background:var(--bg-card);border-radius:10px;padding:12px;border:1px solid var(--border);cursor:pointer}
.region-preview:active{opacity:0.7}
.region-preview .flag{font-size:28px}
.region-preview .name{font-size:12px;color:var(--text-muted)}
.region-preview .topic-text{font-size:12px;font-weight:500;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-source{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px;margin-top:4px}
.data-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.data-dot.real{background:var(--success)}.data-dot.inferred{background:var(--warning)}
.rolling-news-item{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(51,65,85,0.3);cursor:pointer;gap:8px;font-size:13px}
.rolling-news-item:active{opacity:0.7}
.rolling-news-item .rn-rank{font-weight:700;color:var(--primary);min-width:24px;flex-shrink:0}
.rolling-news-item .rn-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rolling-news-item .rn-source{flex-shrink:0;font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(59,130,246,0.15);color:var(--info)}
.update-bar{background:var(--bg-card);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);border:1px solid var(--border)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
@media(min-width:480px){#app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>

var REGION_CONFIG={CN:{name:"中国",flag:"🇨🇳"},HK:{name:"香港",flag:"🇭🇰"},JP:{name:"日本",flag:"🇯🇵"},KR:{name:"韩国",flag:"🇰🇷"},TH:{name:"泰国",flag:"🇹🇭"},IN:{name:"印度",flag:"🇮🇳"},SA:{name:"沙特",flag:"🇸🇦"},BR:{name:"巴西",flag:"🇧🇷"},US:{name:"美国",flag:"🇺🇸"},EU:{name:"欧洲",flag:"🇪🇺"},GB:{name:"英国",flag:"🇬🇧"},RU:{name:"俄罗斯",flag:"🇷🇺"}};
var state={currentTab:"home",currentRegion:"CN",sortBy:"heat",category:"全部",followedTopics:[],topics:SEED_DATA,dataTs:1};

function qa(s){return document.querySelectorAll(s)}

  var ri=REGION_CONFIG[state.currentRegion]||{name:state.currentRegion,flag:"🌐"};
  var topics=SEED_DATA.filter(function(t){return(t.regions||[]).indexOf(state.currentRegion)>=0});
  if(state.category!=="全部")topics=topics.filter(function(t){return t.category===state.category});
  if(state.sortBy==="heat")topics.sort(function(a,b){return b.heat_score-a.heat_score});
  else if(state.sortBy==="time")topics.sort(function(a,b){return(a._idx||99)-(b._idx||0)});
  else topics.sort(function(a,b){return(b.platforms||[]).length-(a.platforms||[]).length});
  var top20=topics.slice(0,20);
  var h='<div class="region-tabs">';
  for(var code in REGION_CONFIG){
    var info=REGION_CONFIG[code];
    h+='<div class="region-tab'+(code===state.currentRegion?" active":"")+'" data-region="'+code+'">'+info.flag+' '+info.name+'</div>';
  }
  h+='</div><div class="filter-bar">';
  [{k:"heat",l:"综合热度"},{k:"time",l:"最新上榜"},{k:"platforms",l:"覆盖平台数"}].forEach(function(s){
    h+='<div class="filter-btn'+(s.k===state.sortBy?" active":"")+'" data-sort="'+s.k+'">'+s.l+'</div>';
  });
  h+='<select id="catSelect" style="margin-left:auto;padding:8px 12px;border-radius:8px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);font-size:13px">';
  ["全部","娱乐","科技","体育","游戏","财经","社会","教育","旅游","军事","国际","其他"].forEach(function(cat){
    h+='<option value="'+cat+'"'+(cat===state.category?" selected":"")+'>'+cat+'</option>';
  });
  h+='</select></div>';
  h+='<div class="flex-between" style="margin-bottom:8px"><span class="text-sm text-muted">📋 '+ri.flag+' '+ri.name+' TOP '+top20.length+'</span><span class="text-sm text-muted">'+new Date().toLocaleDateString("zh-CN")+'</span></div>';
  for(var i=0;i<top20.length;i++){
    var t=top20[i];
    var ph=(t.platforms||[]).slice(0,4).map(function(p){return pBadge(p.platform,p.source_type)}).join("");
    var sl=sLabel(((t.platforms||[])[0]||{}).source_type);
    h+='<div class="topic-list-item'+(i<3?" top-rank":"")+'" data-detail="'+topics.indexOf(t)+'"><div class="rank-num">'+(i+1)+'</div><div class="list-body"><div class="list-title">'+esc(t.title)+'</div><div class="flex-row gap-8" style="margin-top:4px"><span class="heat-score">🔥 '+t.heat_score+'</span><span class="tag tag-primary">'+(t.category||"其他")+'</span></div><div class="platform-row">'+ph+'</div><div class="data-source">'+sl+' · '+(t.platforms||[]).length+'个平台覆盖</div></div></div>';
  }
  c.innerHTML=h;
}
var curIdx=0;
function showD(idx){curIdx=idx;renderDetail();showScreen("detail");window.scrollTo(0,0)}
function renderDetail(){
  var c=q("#screen-detail");if(!c)return;
  var t=SEED_DATA[curIdx];if(!t){c.innerHTML='<div class="empty">话题不存在</div>';return}
  var pl=(t.platforms||[]);
  var h='<div class="back-btn" data-back="home">← 返回</div>';
  h+='<div class="detail-title">'+esc(t.title)+'</div>';
  h+='<div class="flex-row gap-16" style="margin-bottom:16px;flex-wrap:wrap"><span class="heat-big">🔥 '+t.heat_score+'</span><span class="tag tag-primary">'+(t.category||"其他")+'</span></div>';
  h+='<div class="card"><div style="font-weight:600;margin-bottom:12px">🔗 跨平台溯源 ('+pl.length+'个平台)</div>';
  for(var i=0;i<pl.length;i++){
    var p=pl[i];
    var cfg=PLATFORM_CONFIG[p.platform]||{name:p.platform,icon:"📱"};
    h+='<div class="platform-trace-item"><div class="platform-icon">'+cfg.icon+'</div><div class="platform-trace-info"><div class="trace-rank">'+cfg.name+' · 排名 #'+(p.platform_rank||"-")+'</div><div class="text-sm">'+sLabel(p.source_type)+' · 热度 '+(p.platform_heat||"-")+'</div></div><div class="text-sm text-muted" style="text-align:right">'+(p.discussion_count?"讨论 "+fmtNum(p.discussion_count):"")+(p.read_count?"<br>阅读 "+fmtNum(p.read_count):"")+'</div></div>';
  }
  h+="</div>";
  h+='<div class="card"><div style="font-weight:600;margin-bottom:8px">🌍 覆盖区域</div><div class="flex-row flex-wrap gap-8">';
  (t.regions||["CN"]).forEach(function(r){
    var info=REGION_CONFIG[r];
    h+='<span class="tag tag-info">'+(info?info.flag+" "+info.name:r)+'</span>';
  });
  h+="</div></div><div style='height:100px'></div>";
  c.innerHTML=h;
  var bar=q("#detailActionBar");
  if(bar){
    var isF=state.followedTopics.indexOf(t.title)>=0;
    bar.innerHTML='<button class="btn-primary" id="btnFollow">'+(isF?"✓ 已关注":"⭐ 关注")+'</button><button class="btn-secondary" id="btnShare">🔗 分享</button>';
    bar.style.display="flex";
  }
}
function toggleF(){var t=SEED_DATA[curIdx];if(!t)return;var idx=state.followedTopics.indexOf(t.title);if(idx>=0){state.followedTopics.splice(idx,1);toast("已取消关注")}else{state.followedTopics.push(t.title);toast("关注成功")}renderDetail()}
function shareT(){var t=SEED_DATA[curIdx];if(!t)return;var text="🔥 "+t.title+"\n热度: "+t.heat_score+"\n来源: HotSpot Tracker";if(navigator.share)navigator.share({title:"🔥 "+t.title,text:text}).catch(function(){});else{navigator.clipboard.writeText(text).then(function(){toast("已复制")}).catch(function(){toast("分享暂不可用")})}}
function renderSearch(){
  var c=q("#screen-search");if(!c)return;
  var kw=[];var seen={};
  SEED_DATA.forEach(function(t){
    t.title.split(/[\s，。！]/).forEach(function(p){if(p.length>1&&p.length<8&&!seen[p]){seen[p]=true;kw.push(p)}});
  });
  kw=kw.slice(0,10);
  var h='<div class="search-input-wrap"><div class="search-input"><span style="margin-right:8px;font-size:18px">🔍</span><input type="text" id="searchInput" placeholder="搜索全球热点话题..."></div><span class="cancel-btn" id="cancelSearch">取消</span></div><div id="searchResults"></div><div id="searchDefault"><div style="font-weight:600;margin:20px 0 12px;color:#fff">🔥 热门搜索</div><div class="keyword-cloud">';
  for(var i=0;i<kw.length;i++){
    h+='<span class="keyword-tag" data-kw="'+esc(kw[i])+'">'+esc(kw[i])+'</span>';
  }
  h+='</div></div>';
  c.innerHTML=h;
}
function doSearch(q){
  var r=q("#searchResults"),d=q("#searchDefault");
  if(!q||!q.trim()){if(d)d.style.display="block";if(r)r.innerHTML="";return}
  if(d)d.style.display="none";
  var ql=q.trim().toLowerCase();
  var results=SEED_DATA.filter(function(t){return t.title.toLowerCase().indexOf(ql)>=0||(t.category||"").toLowerCase().indexOf(ql)>=0});
  if(r){
    var rh='<div class="text-sm text-muted" style="margin-bottom:12px">找到 '+results.length+' 个相关话题</div>';
    for(var i=0;i<results.length;i++){
      var t=results[i];
      var ph=(t.platforms||[]).slice(0,3).map(function(p){return pBadge(p.platform,p.source_type)}).join("");
      rh+='<div class="search-result-item" data-detail="'+SEED_DATA.indexOf(t)+'"><div class="result-title">'+esc(t.title)+'</div><div class="flex-row gap-8" style="margin-top:6px"><span class="heat-score">🔥 '+t.heat_score+'</span><span class="tag tag-primary">'+(t.category||"其他")+'</span></div><div class="platform-row">'+ph+'</div></div>';
    }
    r.innerHTML=results.length>0?rh:'<div class="empty"><div class="icon">🔍</div><div>未找到相关话题</div></div>';
  }
}
function clearSearch(){var inp=q("#searchInput");if(inp)inp.value="";var r=q("#searchResults");if(r)r.innerHTML="";var d=q("#searchDefault");if(d)d.style.display="block"}
function renderMine(){
  var c=q("#screen-mine");if(!c)return;
  var followed=SEED_DATA.filter(function(t){return state.followedTopics.indexOf(t.title)>=0});
  var h='<div class="card user-card"><div class="avatar">👤</div><div><div class="nickname">热点追踪用户</div><div class="text-sm text-muted">关注话题 · 浏览历史</div></div></div><div class="card"><div style="font-weight:600;margin-bottom:12px">⭐ 我的关注</div>';
  if(followed.length>0){
    for(var i=0;i<followed.length;i++){
      var t=followed[i];
      h+='<div style="padding:12px 0;border-bottom:1px solid rgba(51,65,85,0.5);cursor:pointer" data-detail="'+SEED_DATA.indexOf(t)+'"><div style="font-size:15px;font-weight:500;color:#fff;margin-bottom:6px">'+esc(t.title)+'</div><div class="flex-row gap-8"><span class="heat-score">🔥 '+t.heat_score+'</span><span class="tag tag-primary">'+(t.category||"其他")+'</span></div></div>';
    }
  }else{h+='<div class="empty" style="padding:20px"><div class="icon">📭</div><div>还没有关注话题</div></div>'}
  h+='</div><div class="card"><div class="menu-item" data-action="search"><span>🔍 搜索话题</span><span class="text-muted">›</span></div></div><div class="card" style="text-align:center;padding:24px"><div style="font-size:20px;font-weight:700;color:var(--primary);margin-bottom:8px">🔥 HotSpot Tracker</div><div class="text-sm text-muted">v2.0 · 全球社交媒体热点聚合</div><div class="text-sm text-muted">数据源：微博 · B站 · YouTube · X · Facebook · Instagram · TikTok</div><div style="margin-top:8px;font-size:11px;color:var(--text-muted)">演示数据 · '+SEED_DATA.length+'条话题</div></div>';
  c.innerHTML=h;
}
function showScreen(name){
  qa(".screen").forEach(function(s){s.classList.remove("active")});
  var screen=q("#screen-"+name);
  if(screen)screen.classList.add("active");
  var bar=q("#detailActionBar");
  if(bar)bar.style.display=name==="detail"?"flex":"none";
}
function switchTab(tab){
  state.currentTab=tab;
  showScreen(tab);
  qa(".tab-item").forEach(function(b){b.classList.remove("active")});
  var btn=q('.tab-item[data-tab="'+tab+'"]');
  if(btn)btn.classList.add("active");
  if(tab==="home")renderHome();
  else if(tab==="ranking")renderRanking();
  else if(tab==="search")renderSearch();
  else if(tab==="mine")renderMine();
}
function setR(code){state.currentRegion=code;renderRanking()}
function setS(sort){state.sortBy=sort;renderRanking()}
function setC(cat){state.category=cat;renderRanking()}
function switchToRegion(code){state.currentRegion=code;state.sortBy="heat";state.category="全部";switchTab("ranking")}
document.addEventListener("click",function(e){
  var el=e.target;
  if(el.closest(".tab-item")){switchTab(el.closest(".tab-item").dataset.tab);return}
  if(el.closest("[data-action='search']")){switchTab("search");return}
  if(el.closest("[data-kw]")){quickSearch(el.closest("[data-kw]").dataset.kw);return}
  if(el.closest("[data-detail]")){showD(parseInt(el.closest("[data-detail]").dataset.detail));return}
  if(el.closest("[data-region]")){switchToRegion(el.closest("[data-region]").dataset.region);return}
  if(el.closest("[data-sort]")){setS(el.closest("[data-sort]").dataset.sort);return}
  if(el.closest("#cancelSearch")){clearSearch();return}
  if(el.closest("#btnFollow")){toggleF();return}
  if(el.closest("#btnShare")){shareT();return}
});
document.addEventListener("keyup",function(e){
  if(e.target.id==="searchInput"&&e.key==="Enter")doSearch(e.target.value);
});
document.addEventListener("change",function(e){
  if(e.target.id==="catSelect")setC(e.target.value);
});
function quickSearch(kw){var inp=q("#searchInput");if(inp)inp.value=kw;doSearch(kw)}
// Live data fetch: polls data.json from same origin (GitHub Pages)
var LIVE_DATA_URL = "data.json";
var livePollTimer = null;
function startLivePoll() {
  livePollTimer = setInterval(fetchLiveData, 30000);
  fetchLiveData();
}
function fetchLiveData() {
  fetch(LIVE_DATA_URL, {cache: "no-cache"})
    .then(function(r) { if (!r.ok) throw new Error("not available"); return r.json(); })
    .then(function(d) {
      if (d.topics && d.topics.length > 0) {
        SEED_DATA = d.topics;
        state.topics = d.topics;
        state.dataTs = Date.now();
        renderCurrent();
        console.log("[LiveData] Updated: " + d.topics.length + " topics, source: " + (d.meta ? d.meta.source : "GitHub"));
      }
    })
    .catch(function(e) {
      console.log("[LiveData] Not available, using cached data");
    });
}
function renderCurrent() {
  if (state.currentTab === "home") renderHome();
  else if (state.currentTab === "ranking") renderRanking();
}

function init(){
  var app=q("#app");if(!app)return;
  ["home","ranking","search","mine","detail"].forEach(function(name){
    var screen=document.createElement("div");
    screen.id="screen-"+name;
    screen.className="screen"+(name==="home"?" active":"");
    app.appendChild(screen);
  });
  var bar=document.createElement("div");
  bar.id="detailActionBar";
  bar.className="action-bar";
  app.appendChild(bar);
  renderHome();
  renderRanking();
  renderSearch();
}
document.addEventListener("DOMContentLoaded",function(){init();startLivePoll();});

</script>
</body>
</html>
